# ── Control Test ─────────────────────────────────────────────────────────────
control:
  orlando:
    date: "2022-09-28"   # Same date as Ian
    bbox: [-81.6, 28.3, -81.2, 28.7]
    description: "Control — Central Florida (Orlando area)"
