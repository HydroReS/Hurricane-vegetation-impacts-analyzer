name: hurricane_veg
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11

  # Geospatial
  - geopandas=0.14.4
  - rasterio=1.3.10
  - pyproj=3.6.1
  - shapely=2.0.4
  - fiona=1.9.6

  # Data science & statistics
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.1
  - statsmodels=0.14.2

  # Visualization
  - matplotlib=3.9.0
  - plotly=5.22.0
  - folium=0.17.0

  # Utilities
  - pyyaml=6.0.1
  - jinja2=3.1.4
  - click=8.1.7

  # Testing
  - pytest=8.2.2
  - pytest-cov=5.0.0

  # pip-only packages (not well-packaged on conda-forge)
  - pip
  - pip:
    - earthengine-api==0.1.396
    - geemap==0.33.0
    - streamlit==1.35.0
    - streamlit-folium==0.21.0
    - pystac-client==0.7.7
    - planetary-computer==1.0.0
    - stackstac==0.5.1
